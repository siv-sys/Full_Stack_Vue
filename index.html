<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="dns-prefetch" href="//localhost:8000" />
    <link rel="preconnect" href="http://localhost:8000" crossorigin />
    <title>ShopVue</title>
  </head>
  <body>
    <div id="app">
      <div id="app-loader" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fff;gap:12px;">
        <div style="width:36px;height:36px;border:3px solid #e5e4e7;border-top-color:#aa3bff;border-radius:50%;animation:lspin .6s linear infinite;"></div>
        <span style="font:14px/1 system-ui,sans-serif;color:#6b6375;">Loading&hellip;</span>
      </div>
      <style>@keyframes lspin{to{transform:rotate(360deg)}}@media(prefers-color-scheme:dark){#app-loader{background:#16171d}#app-loader>div{border-color:#2e303a;border-top-color:#c084fc}#app-loader>span{color:#9ca3af}}</style>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
